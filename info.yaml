project:
  title: "Low-Area AES-128 Hardware Accelerator"
  author: "ECE4063 Group RR0035"
  discord: ""
  description: "Byte-serial Tiny Tapeout interface for a shared-S-box AES-128 encryption core"
  language: "SystemVerilog"
  clock_hz: 50000000
  tiles: "8x2"
  top_module: "tt_um_rran0035_aes128"
  source_files:
    - "aes_sbox_case.sv"
    - "aes_core_lowarea_tt.sv"
    - "tt_um_rran0035_aes128.sv"

pinout:
  ui[0]: "Input data byte bit 0"
  ui[1]: "Input data byte bit 1"
  ui[2]: "Input data byte bit 2"
  ui[3]: "Input data byte bit 3"
  ui[4]: "Input data byte bit 4"
  ui[5]: "Input data byte bit 5"
  ui[6]: "Input data byte bit 6"
  ui[7]: "Input data byte bit 7"

  uo[0]: "Ciphertext byte bit 0"
  uo[1]: "Ciphertext byte bit 1"
  uo[2]: "Ciphertext byte bit 2"
  uo[3]: "Ciphertext byte bit 3"
  uo[4]: "Ciphertext byte bit 4"
  uo[5]: "Ciphertext byte bit 5"
  uo[6]: "Ciphertext byte bit 6"
  uo[7]: "Ciphertext byte bit 7"

  uio[0]: "Command bit 0 (input)"
  uio[1]: "Command bit 1 (input)"
  uio[2]: "Command-valid strobe (input)"
  uio[3]: "Result ready (output)"
  uio[4]: "AES busy (output)"
  uio[5]: "Plaintext loaded (output)"
  uio[6]: "Key loaded (output)"
  uio[7]: "Wrapper ready (output)"

yaml_version: 6
